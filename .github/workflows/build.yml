name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.4.0)'
        required: false

permissions:
  contents: write

jobs:
  build-mac:
    name: Mac (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Build Mac DMG (arm64)
        run: npx electron-builder --mac dmg --arm64
        env:
          SKIP_NOTARIZE: '1'

      - name: Build Mac DMG (x64)
        run: npx electron-builder --mac dmg --x64
        env:
          SKIP_NOTARIZE: '1'

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*.dmg.blockmap

  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Build Linux deb + AppImage
        run: npx electron-builder --linux deb AppImage --x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            release/*.deb
            release/*.AppImage

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*.exe
            release/*.exe.blockmap

  release:
    name: Upload to GitHub Release
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-builds/*
            artifacts/linux-builds/*
            artifacts/windows-builds/*
          fail_on_unmatched_files: false
